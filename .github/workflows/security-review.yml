name: "🔒 Security Review – SAST + Dependency + API Scan"

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  workflow_dispatch:

concurrency:
  group: trackback-security-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: read
  security-events: write

env:
  NODE_VERSION: "22"

# ════════════════════════════════════════════════════════════════════════════
# JOB 1 – Detect technology stack and inventory APIs
# ════════════════════════════════════════════════════════════════════════════
jobs:
  detect-stack:
    name: "🔍 Stack Detection & API Inventory"
    runs-on: ubuntu-latest
    timeout-minutes: 5

    steps:
      - name: "📥 Checkout repository"
        uses: actions/checkout@v4

      - name: "📦 Setup Node.js"
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}

      - name: "🔍 Detect tech stack"
        run: |
          echo "### 📋 TrackBack Technology Stack" >> $GITHUB_STEP_SUMMARY
          echo "| Component | Technology | Version |" >> $GITHUB_STEP_SUMMARY
          echo "|-----------|-----------|---------|" >> $GITHUB_STEP_SUMMARY

          FE_PKG="Frontend/package.json"
          REACT=$(node -e "const p=require('./$FE_PKG'); console.log(p.dependencies?.react || 'N/A')")
          VITE=$(node -e "const p=require('./$FE_PKG'); console.log(p.devDependencies?.vite || 'N/A')")
          FIREBASE=$(node -e "const p=require('./$FE_PKG'); console.log(p.dependencies?.firebase || 'N/A')")
          LUCIDE=$(node -e "const p=require('./$FE_PKG'); console.log(p.dependencies?.['lucide-react'] || 'N/A')")

          echo "| Frontend Framework | React | $REACT |" >> $GITHUB_STEP_SUMMARY
          echo "| Build Tool | Vite | $VITE |" >> $GITHUB_STEP_SUMMARY
          echo "| BaaS | Firebase | $FIREBASE |" >> $GITHUB_STEP_SUMMARY
          echo "| Icon Library | Lucide React | $LUCIDE |" >> $GITHUB_STEP_SUMMARY
          echo "| Mobile | Expo / React Native | $(node -e "const p=require('./Mobile/package.json'); console.log(p.dependencies?.expo||'N/A')") |" >> $GITHUB_STEP_SUMMARY
          echo "| Runtime | Node.js | $(node --version) |" >> $GITHUB_STEP_SUMMARY
          echo "| Auth | Firebase Auth | cloud |" >> $GITHUB_STEP_SUMMARY
          echo "| Database | Firebase RTDB | cloud |" >> $GITHUB_STEP_SUMMARY
          echo "| Storage | Cloudinary | cloud |" >> $GITHUB_STEP_SUMMARY

      - name: "📋 Generate API Inventory"
        run: |
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "### 🗂️ Service / API Inventory" >> $GITHUB_STEP_SUMMARY
          echo "| Service | Auth Required | Operations | File |" >> $GITHUB_STEP_SUMMARY
          echo "|---------|--------------|-----------|------|" >> $GITHUB_STEP_SUMMARY
          echo "| userService | Yes | getUserProfile, updateUserProfile, createUserProfile | Backend/services/userService.js |" >> $GITHUB_STEP_SUMMARY
          echo "| itemService | Yes | createItem, subscribeToItems, updateItem, deleteItem | Backend/services/itemService.js |" >> $GITHUB_STEP_SUMMARY
          echo "| chatService | Yes | sendMessage, subscribeToChat, deleteChat | Backend/services/chatService.js |" >> $GITHUB_STEP_SUMMARY
          echo "| requestService | Yes | createRequest, getRequests, updateRequest | Backend/services/requestService.js |" >> $GITHUB_STEP_SUMMARY
          echo "| aiService | Yes | analyzeImage, generateDescription | Backend/services/aiService.js |" >> $GITHUB_STEP_SUMMARY
          echo "| cloudinaryService | Yes | uploadImage | Backend/services/cloudinaryService.js |" >> $GITHUB_STEP_SUMMARY
          echo "| Firebase Auth | No (public) | signIn, signUp, signOut, resetPassword | firebase/auth |" >> $GITHUB_STEP_SUMMARY

  # ════════════════════════════════════════════════════════════════════════════
  # JOB 2 – SAST with Semgrep
  # ════════════════════════════════════════════════════════════════════════════
  sast-semgrep:
    name: "🔐 SAST – Semgrep"
    runs-on: ubuntu-latest
    timeout-minutes: 15
    needs: detect-stack

    steps:
      - name: "📥 Checkout repository"
        uses: actions/checkout@v4

      - name: "🔐 Run Semgrep SAST scan"
        uses: semgrep/semgrep-action@v1
        with:
          config: >-
            p/javascript
            p/react
            p/secrets
            p/owasp-top-ten
            p/firebase
            p/nodejsscan
        env:
          SEMGREP_APP_TOKEN: ${{ secrets.SEMGREP_APP_TOKEN }}
        continue-on-error: true

  # ════════════════════════════════════════════════════════════════════════════
  # JOB 3 – Dependency Vulnerability Scan (npm audit + Trivy)
  # ════════════════════════════════════════════════════════════════════════════
  dependency-scan:
    name: "📦 Dependency Vulnerability Scan"
    runs-on: ubuntu-latest
    timeout-minutes: 15
    needs: detect-stack

    steps:
      - name: "📥 Checkout repository"
        uses: actions/checkout@v4

      - name: "📦 Setup Node.js"
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: npm
          cache-dependency-path: |
            Frontend/package-lock.json
            Mobile/package-lock.json

      - name: "🔍 npm audit – Frontend"
        id: frontend-audit
        working-directory: Frontend
        run: |
          npm install --no-audit --ignore-scripts
          mkdir -p ../security-artifacts
          echo "## 📦 Frontend Dependency Audit" >> ../security-artifacts/dependency-audit.txt
          npm audit --audit-level=moderate --json > ../security-artifacts/frontend-audit.json 2>&1 || true
          npm audit --audit-level=moderate 2>&1 | tail -30 >> ../security-artifacts/dependency-audit.txt || true
          echo "" >> ../security-artifacts/dependency-audit.txt

      - name: "🔍 npm audit – Mobile"
        working-directory: Mobile
        run: |
          npm ci --ignore-scripts
          echo "## 📦 Mobile Dependency Audit" >> ../security-artifacts/dependency-audit.txt
          npm audit --audit-level=moderate 2>&1 | tail -30 >> ../security-artifacts/dependency-audit.txt || true

      - name: "🛡️  Run Trivy filesystem scan"
        uses: aquasecurity/trivy-action@v0.28.0
        with:
          scan-type: fs
          scan-ref: .
          format: sarif
          output: security-artifacts/trivy-results.sarif
          severity: CRITICAL,HIGH,MEDIUM
        continue-on-error: true

      - name: "📤 Upload dependency scan artifacts"
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: dependency-scan-${{ github.run_number }}
          path: security-artifacts/
          retention-days: 30

  # ════════════════════════════════════════════════════════════════════════════
  # JOB 4 – Secret Detection with Gitleaks
  # ════════════════════════════════════════════════════════════════════════════
  secret-detection:
    name: "🔑 Secret Detection – Gitleaks"
    runs-on: ubuntu-latest
    timeout-minutes: 15

    steps:
      - name: "📥 Checkout repository (full history)"
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: "🔑 Run Gitleaks"
        uses: gitleaks/gitleaks-action@v2
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          GITLEAKS_LICENSE: ${{ secrets.GITLEAKS_LICENSE }}
        continue-on-error: true

  # ════════════════════════════════════════════════════════════════════════════
  # JOB 5 – Generate Security Reports (Markdown + Executive Summary)
  # ════════════════════════════════════════════════════════════════════════════
  generate-security-report:
    name: "📊 Generate Security Reports"
    runs-on: ubuntu-latest
    timeout-minutes: 15
    needs: [sast-semgrep, dependency-scan, secret-detection]
    if: always()

    steps:
      - name: "📥 Checkout repository"
        uses: actions/checkout@v4

      - name: "📦 Setup Node.js"
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}

      - name: "📥 Download dependency scan artifacts"
        uses: actions/download-artifact@v4
        with:
          name: dependency-scan-${{ github.run_number }}
          path: security-artifacts
        continue-on-error: true

      - name: "📦 Install report dependencies"
        run: npm install exceljs --no-save --no-audit --ignore-scripts

      - name: "📊 Generate security reports"
        env:
          SAST_STATUS: ${{ needs.sast-semgrep.result }}
          DEP_STATUS: ${{ needs.dependency-scan.result }}
          SECRET_STATUS: ${{ needs.secret-detection.result }}
          BUILD_NUMBER: ${{ github.run_number }}
          COMMIT_SHA: ${{ github.sha }}
          BRANCH: ${{ github.ref_name }}
        run: node .github/scripts/generate-security-reports.cjs

      - name: "⬆️  Upload security reports"
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: security-reports-${{ github.run_number }}
          path: |
            Vulnerability Test Results/
          retention-days: 90

      - name: "📋 Publish Security Summary"
        if: always()
        run: |
          SAST="${{ needs.sast-semgrep.result }}"
          DEP="${{ needs.dependency-scan.result }}"
          SECRET="${{ needs.secret-detection.result }}"

          SAST_ICON="✅"; [ "$SAST" != "success" ] && SAST_ICON="⚠️"
          DEP_ICON="✅"; [ "$DEP" != "success" ] && DEP_ICON="⚠️"
          SECRET_ICON="✅"; [ "$SECRET" != "success" ] && SECRET_ICON="⚠️"

          REPORT_FILE="Vulnerability Test Results/security-review.md"
          CRITICAL=0; HIGH=0; MEDIUM=0; LOW=0
          if [ -f "$REPORT_FILE" ]; then
            CRITICAL=$(grep -c "CRITICAL" "$REPORT_FILE" 2>/dev/null || echo 0)
            HIGH=$(grep -c "| HIGH |" "$REPORT_FILE" 2>/dev/null || echo 0)
            MEDIUM=$(grep -c "| MEDIUM |" "$REPORT_FILE" 2>/dev/null || echo 0)
            LOW=$(grep -c "| LOW |" "$REPORT_FILE" 2>/dev/null || echo 0)
          fi

          cat >> $GITHUB_STEP_SUMMARY << EOF
          # 🔒 TrackBack Security Review Summary

          | Check | Status | Result |
          |-------|--------|--------|
          | 🔐 SAST (Semgrep) | $SAST_ICON | $SAST |
          | 📦 Dependency Audit | $DEP_ICON | $DEP |
          | 🔑 Secret Detection | $SECRET_ICON | $SECRET |

          ## Vulnerability Findings

          | Severity | Count |
          |----------|-------|
          | 🔴 Critical | $CRITICAL |
          | 🟠 High | $HIGH |
          | 🟡 Medium | $MEDIUM |
          | 🔵 Low | $LOW |

          **Build:** #${{ github.run_number }} · **Branch:** \`${{ github.ref_name }}\` · **Commit:** \`${{ github.sha }}\`

          > Download the **security-reports** artifact for full Excel + Markdown reports.
          EOF

      - name: "❌ Fail workflow on Critical findings"
        run: |
          REPORT_FILE="Vulnerability Test Results/security-review.md"
          if [ -f "$REPORT_FILE" ]; then
            CRITICAL=$(grep -c "| CRITICAL |" "$REPORT_FILE" 2>/dev/null || echo 0)
            if [ "$CRITICAL" -gt 0 ]; then
              echo "❌ $CRITICAL Critical security finding(s) detected. Failing build."
              exit 1
            fi
          fi
          echo "✅ No critical findings detected."
