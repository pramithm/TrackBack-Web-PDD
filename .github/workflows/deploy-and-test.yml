name: "🚀 Deploy to GitHub Pages + Selenium E2E Tests"

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  workflow_dispatch:

# Required for GITHUB_TOKEN to push to gh-pages and deploy Pages
permissions:
  contents: write
  pages: write
  id-token: write

env:
  NODE_VERSION: "20"
  REPO_OWNER: ${{ github.repository_owner }}
  REPO_NAME: ${{ github.event.repository.name }}

# ════════════════════════════════════════════════════════════════════════════
# JOB 1 – Build & Deploy Vite app to GitHub Pages
# ════════════════════════════════════════════════════════════════════════════
jobs:
  build-and-deploy:
    name: "🔨 Build & Deploy Vite App"
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: Frontend

    steps:
      - name: "📥 Checkout repository"
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: "📦 Setup Node.js ${{ env.NODE_VERSION }}"
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: npm
          cache-dependency-path: Frontend/package-lock.json

      - name: "📦 Install dependencies"
        run: |
          rm -f package-lock.json
          npm install

      - name: "🏗️  Build Vite app"
        env:
          VITE_FIREBASE_API_KEY: ${{ secrets.VITE_FIREBASE_API_KEY }}
          VITE_FIREBASE_AUTH_DOMAIN: ${{ secrets.VITE_FIREBASE_AUTH_DOMAIN }}
          VITE_FIREBASE_DATABASE_URL: ${{ secrets.VITE_FIREBASE_DATABASE_URL }}
          VITE_FIREBASE_PROJECT_ID: ${{ secrets.VITE_FIREBASE_PROJECT_ID }}
          VITE_FIREBASE_STORAGE_BUCKET: ${{ secrets.VITE_FIREBASE_STORAGE_BUCKET }}
          VITE_FIREBASE_MESSAGING_SENDER_ID: ${{ secrets.VITE_FIREBASE_MESSAGING_SENDER_ID }}
          VITE_FIREBASE_APP_ID: ${{ secrets.VITE_FIREBASE_APP_ID }}
        run: npm run build

      - name: "🚀 Deploy to GitHub Pages"
        uses: peaceiris/actions-gh-pages@v4
        with:
          github_token: ${{ secrets.GITHUB_TOKEN }}
          publish_dir: Frontend/dist
          publish_branch: gh-pages
          destination_dir: .
          keep_files: true
          commit_message: "🚀 Deploy TrackBack Web – Build #${{ github.run_number }}"

  # ════════════════════════════════════════════════════════════════════════════
  # JOB 2 – Verify Deployment is Live
  # ════════════════════════════════════════════════════════════════════════════
  verify-deployment:
    name: "🔍 Verify Live Deployment"
    runs-on: ubuntu-latest
    needs: build-and-deploy

    outputs:
      live_url: ${{ steps.set-url.outputs.url }}

    steps:
      - name: "⏳ Wait 45 s for Pages propagation"
        run: sleep 45

      - name: "🔗 Compute live URL"
        id: set-url
        run: |
          URL="https://${{ github.repository_owner }}.github.io/${{ github.event.repository.name }}/"
          echo "url=$URL" >> $GITHUB_OUTPUT
          echo "Live URL: $URL"

      - name: "✅ Verify HTTP 200 from live URL"
        run: |
          URL="${{ steps.set-url.outputs.url }}"
          MAX=5; DELAY=20; i=0
          while [ $i -lt $MAX ]; do
            STATUS=$(curl -s -o /dev/null -w "%{http_code}" "$URL")
            echo "Attempt $((i+1))/$MAX – HTTP $STATUS"
            if [ "$STATUS" -eq 200 ]; then
              echo "✅ Site is live!"
              break
            fi
            i=$((i+1))
            [ $i -lt $MAX ] && sleep $DELAY
          done
          echo "### 🌐 Deployment URL" >> $GITHUB_STEP_SUMMARY
          echo "$URL – HTTP $STATUS" >> $GITHUB_STEP_SUMMARY

  # ════════════════════════════════════════════════════════════════════════════
  # JOB 3 – Selenium E2E Tests Against Live GitHub Pages
  # ════════════════════════════════════════════════════════════════════════════
  selenium-e2e:
    name: "🧪 Selenium E2E Tests (Live)"
    runs-on: ubuntu-latest
    needs: verify-deployment

    steps:
      - name: "📥 Checkout repository"
        uses: actions/checkout@v4

      - name: "📦 Setup Node.js ${{ env.NODE_VERSION }}"
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: npm
          cache-dependency-path: Frontend/package-lock.json

      - name: "🌐 Setup Chrome"
        uses: browser-actions/setup-chrome@v1

      - name: "🔍 Verify Chrome Installation"
        run: |
          google-chrome --version

      - name: "📦 Install frontend dependencies"
        working-directory: Frontend
        run: |
          rm -f package-lock.json
          npm install

      - name: "🧹 Create test output directory"
        run: mkdir -p "Frontend/Test Results/Screenshots" "Frontend/Test Results/Logs" "Frontend/Test Results/HTML" "Frontend/Test Results/Excel" "Frontend/Test Results/Summary"

      - name: "🧪 Run Selenium E2E tests against live URL"
        working-directory: Frontend
        env:
          REPO_OWNER: ${{ github.repository_owner }}
          REPO_NAME: ${{ github.event.repository.name }}
          BASE_URL: "https://${{ github.repository_owner }}.github.io/${{ github.event.repository.name }}/"
          TEST_EMAIL: ${{ secrets.firebase_mail }}
          TEST_PASSWORD: ${{ secrets.firebase_password }}
          TEST_OUTPUT_DIR: "Test Results"
          CI: "true"
        run: |
          mkdir -p "Test Results/Logs" "Test Results/Screenshots" "Test Results/Excel" "Test Results/Summary"
          set -o pipefail
          set +e
          npm run test:e2e 2>&1 | tee "Test Results/Logs/selenium-run.log"
          TEST_EXIT_CODE=$?
          set -e
          exit $TEST_EXIT_CODE

      - name: "📊 Generate HTML + Excel + Summary reports"
        if: always()
        working-directory: Frontend
        env:
          BASE_URL: "https://${{ github.repository_owner }}.github.io/${{ github.event.repository.name }}/"
          BUILD_NUMBER: ${{ github.run_number }}
          COMMIT_SHA: ${{ github.sha }}
          BRANCH: ${{ github.ref_name }}
        run: node selenium-tests/scripts/generate-reports.cjs

      - name: "⬆️  Upload test artifacts"
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: selenium-e2e-reports-${{ github.run_number }}
          path: |
            Frontend/Test Results/
          retention-days: 30

      # ── Stage for GitHub Pages ─────────────────────────────────────────
      - name: "📄 Prepare GitHub Pages report structure"
        if: always()
        run: |
          BUILD_DIR="gh-pages-web/web-reports/history/build-$(printf '%03d' ${{ github.run_number }})"
          mkdir -p gh-pages-web/web-reports/latest
          mkdir -p "$BUILD_DIR"

          # Latest
          cp "Frontend/Test Results/execution-report.html" gh-pages-web/web-reports/latest/ 2>/dev/null || true
          cp -r "Frontend/Test Results/Screenshots" gh-pages-web/web-reports/latest/ 2>/dev/null || true
          cp -r "Frontend/Test Results/Logs" gh-pages-web/web-reports/latest/ 2>/dev/null || true
          cp "Frontend/Test Results/Summary/summary.md" gh-pages-web/web-reports/latest/ 2>/dev/null || true

          # History snapshot
          cp -r "Frontend/Test Results/." "$BUILD_DIR/" 2>/dev/null || true

      - name: "📖 Fetch existing gh-pages history"
        if: always()
        uses: actions/checkout@v4
        continue-on-error: true
        with:
          ref: gh-pages
          path: gh-pages-existing-web

      - name: "🔀 Merge existing web-reports history"
        if: always()
        run: |
          if [ -d gh-pages-existing-web/web-reports/history ]; then
            mkdir -p gh-pages-web/web-reports/history
            cp -rn gh-pages-existing-web/web-reports/history/. gh-pages-web/web-reports/history/ 2>/dev/null || true
          fi

      - name: "🚀 Publish reports to GitHub Pages"
        if: always()
        uses: peaceiris/actions-gh-pages@v4
        with:
          github_token: ${{ secrets.GITHUB_TOKEN }}
          publish_dir: gh-pages-web
          publish_branch: gh-pages
          destination_dir: .
          keep_files: true
          commit_message: "📊 Selenium E2E Report – Build #${{ github.run_number }}"

      # ── GitHub Actions Summary ─────────────────────────────────────────
      - name: "📋 Publish GitHub Actions Summary"
        if: always()
        run: |
          LIVE_URL="https://${{ github.repository_owner }}.github.io/${{ github.event.repository.name }}/"
          REPORT_URL="https://${{ github.repository_owner }}.github.io/${{ github.event.repository.name }}/web-reports/latest/execution-report.html"

          RESULTS_FILE="Frontend/Test Results/Summary/summary.md"
          TOTAL=0; PASSED=0; FAILED=0; SKIPPED=0; RATE="N/A"
          FAILED_LIST=""
          if [ -f "$RESULTS_FILE" ]; then
            TOTAL=$(grep -oP 'Total Tests\s*\|\s*\K\d+' "$RESULTS_FILE" 2>/dev/null || echo 0)
            PASSED=$(grep -oP 'Passed\s*\|\s*\K\d+' "$RESULTS_FILE" 2>/dev/null || echo 0)
            FAILED=$(grep -oP 'Failed\s*\|\s*\K\d+' "$RESULTS_FILE" 2>/dev/null || echo 0)
            SKIPPED=$(grep -oP 'Skipped\s*\|\s*\K\d+' "$RESULTS_FILE" 2>/dev/null || echo 0)
            RATE=$(grep -oP 'Pass Percentage\s*\|\s*\K[\d.]+%' "$RESULTS_FILE" 2>/dev/null || echo "N/A")
          fi

          cat >> $GITHUB_STEP_SUMMARY << EOF
          # 🌐 Live GitHub Pages E2E Test Summary

          | Field | Value |
          |-------|-------|
          | **Deployment URL** | $LIVE_URL |
          | **Build Number**   | #${{ github.run_number }} |
          | **Execution Date** | $(date -u '+%Y-%m-%d %H:%M UTC') |
          | **Branch**         | \`${{ github.ref_name }}\` |
          | **Commit**         | \`${{ github.sha }}\` |

          ## Test Results

          | Metric     | Count |
          |------------|-------|
          | 🧪 Total   | $TOTAL |
          | ✅ Passed  | $PASSED |
          | ❌ Failed  | $FAILED |
          | ⏭️  Skipped | $SKIPPED |
          | 📈 Pass %  | $RATE |

          ## 📊 Report URL
          > **[View Live HTML Report]($REPORT_URL)**
          EOF
