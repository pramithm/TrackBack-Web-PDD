name: "🔒 Security Review – SAST + Dependency Scan"

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

permissions:
  contents: read
  security-events: write

jobs:
  detect-stack:
    name: "🔍 Detect Technology Stack"
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "20"

      - name: Detect stack
        run: |
          echo "### 📋 Technology Stack" >> $GITHUB_STEP_SUMMARY
          echo "| Tool | Version |" >> $GITHUB_STEP_SUMMARY
          echo "|------|---------|" >> $GITHUB_STEP_SUMMARY
          REACT=$(node -e "const p=require('./Frontend/package.json'); console.log(p.dependencies?.react || 'N/A')")
          VITE=$(node -e "const p=require('./Frontend/package.json'); console.log(p.devDependencies?.vite || 'N/A')")
          FIREBASE=$(node -e "const p=require('./Frontend/package.json'); console.log(p.dependencies?.firebase || 'N/A')")
          echo "| React | $REACT |" >> $GITHUB_STEP_SUMMARY
          echo "| Vite  | $VITE  |" >> $GITHUB_STEP_SUMMARY
          echo "| Firebase | $FIREBASE |" >> $GITHUB_STEP_SUMMARY
          echo "| Node | $(node --version) |" >> $GITHUB_STEP_SUMMARY

  sast-semgrep:
    name: "🔐 SAST – Semgrep"
    runs-on: ubuntu-latest
    needs: detect-stack
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Run Semgrep SAST
        uses: semgrep/semgrep-action@v1
        with:
          config: >-
            p/javascript
            p/react
            p/secrets
            p/owasp-top-ten
        continue-on-error: true

  dependency-scan:
    name: "📦 Dependency Vulnerability Scan"
    runs-on: ubuntu-latest
    needs: detect-stack
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "20"

      - name: Install & audit Frontend
        working-directory: Frontend
        run: |
          npm ci
          echo "### 📦 Dependency Audit Results" >> $GITHUB_STEP_SUMMARY
          npm audit --audit-level=high 2>&1 | tail -20 >> $GITHUB_STEP_SUMMARY || echo "Audit completed (findings above)" >> $GITHUB_STEP_SUMMARY

  secret-detection:
    name: "🔑 Secret Detection – Gitleaks"
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Run Gitleaks
        uses: gitleaks/gitleaks-action@v2
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        continue-on-error: true

  generate-report:
    name: "📊 Generate Security Reports"
    runs-on: ubuntu-latest
    needs: [sast-semgrep, dependency-scan, secret-detection]
    if: always()
    steps:
      - name: Security Summary Report
        run: |
          echo "## 🔒 TrackBack Security Review Summary" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "| Check | Status |" >> $GITHUB_STEP_SUMMARY
          echo "|-------|--------|" >> $GITHUB_STEP_SUMMARY
          echo "| 🔐 SAST (Semgrep) | ${{ needs.sast-semgrep.result }} |" >> $GITHUB_STEP_SUMMARY
          echo "| 📦 Dependency Audit | ${{ needs.dependency-scan.result }} |" >> $GITHUB_STEP_SUMMARY
          echo "| 🔑 Secret Detection | ${{ needs.secret-detection.result }} |" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "**Build:** #${{ github.run_number }} · **Branch:** \`${{ github.ref_name }}\` · **Commit:** \`${{ github.sha }}\`" >> $GITHUB_STEP_SUMMARY
